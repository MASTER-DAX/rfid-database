<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Cottage System — Accounts</title>

<link href="https://fonts.googleapis.com/css?family=Nunito:400,700,800" rel="stylesheet">
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<style>
:root {
  --primary:#1f6feb;
  --bg:#e8f2ff;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Nunito,system-ui;
  background:var(--bg);
}

.page {
  display:flex;
  gap:20px;
  padding:20px;
}

/* LEFT */
.db-panel {
  flex:1.3;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.cottages {
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.cottages button {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:0;
  background:#e5edff;
  color:var(--primary);
  font-weight:600;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e5e7eb;
}

/* RIGHT */
.form-wrap {
  flex:1;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

label {
  display:block;
  margin-top:10px;
  font-size:13px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

input[readonly] {
  background:#f3f4f6;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:14px;
}

button.primary {
  flex:1;
  background:var(--primary);
  color:white;
  border:0;
  padding:12px;
  border-radius:10px;
  font-weight:600;
}

button.secondary {
  flex:1;
  background:transparent;
  border:1px solid var(--primary);
  color:var(--primary);
  padding:12px;
  border-radius:10px;
}

#log {
  margin-top:12px;
  font-size:13px;
  min-height:20px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="page">

<!-- LEFT TABLE -->
<div class="db-panel">
  <h3>Cottages</h3>

  <div class="cottages">
    <button onclick="loadCottage('COTTAGE-1')">Cottage 1</button>
    <button onclick="loadCottage('COTTAGE-2')">Cottage 2</button>
    <button onclick="loadCottage('COTTAGE-3')">Cottage 3</button>
    <button onclick="loadCottage('COTTAGE-4')">Cottage 4</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Employee ID</th>
        <th>Valid Until</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userRows"></tbody>
  </table>
</div>

<!-- RIGHT FORM -->
<div class="form-wrap">
  <h3>Register Card</h3>

  <label>Card UID
    <input id="uid" readonly placeholder="Tap card">
  </label>

  <label>Name
    <input id="name">
  </label>

  <label>Employee ID
    <input id="employee_id">
  </label>

  <label>Access Level
    <select id="access_level">
      <option value="guest">Guest</option>
      <option value="basic">Basic</option>
      <option value="premium">Premium</option>
      <option value="admin">Admin</option>
    </select>
  </label>

  <label>Valid Until
    <input type="date" id="valid_until">
  </label>

  <label>Cottage
    <select id="cottage">
      <option>COTTAGE-1</option>
      <option>COTTAGE-2</option>
      <option>COTTAGE-3</option>
      <option>COTTAGE-4</option>
    </select>
  </label>

  <div class="actions">
    <button class="primary" onclick="save()">Save</button>
    <button class="secondary" onclick="clearForm()">Clear</button>
  </div>

  <div id="log">Waiting for card…</div>
</div>

</div>

<script>
const socket = io();

let activeCottage = null;
let cardStillValid = false;

const uid = document.getElementById("uid");
const nameInput = document.getElementById("name");
const employeeInput = document.getElementById("employee_id");
const accessInput = document.getElementById("access_level");
const validInput = document.getElementById("valid_until");
const cottageInput = document.getElementById("cottage");

/* -------------------------
   SOCKET EVENTS
--------------------------*/
socket.on("card_tapped", data => {
  uid.value = data.uid;

  if (data.access === "granted") {
    cardStillValid = true;
    logMsg("Card already registered — ACCESS GRANTED", "#b45309");
  } else {
    cardStillValid = false;
    logMsg("New/expired card — ready to register", "#15803d");
  }
});

/* -------------------------
   HELPERS
--------------------------*/
function logMsg(msg, color="#000") {
  const log = document.getElementById("log");
  log.textContent = msg;
  log.style.color = color;
}

function clearForm() {
  nameInput.value = "";
  employeeInput.value = "";
  validInput.value = "";
  cardStillValid = false;
}

/* -------------------------
   SAVE USER
--------------------------*/
async function save() {

  if (!uid.value || !nameInput.value) {
    logMsg("❌ Tap card + enter name first", "#b91c1c");
    return;
  }

  if (cardStillValid) {
    logMsg("❌ Card still valid. Cannot re-register.", "#b91c1c");
    return;
  }

  const payload = {
    uid: uid.value,
    name: nameInput.value,
    employee_id: employeeInput.value,
    access_level: accessInput.value,
    valid_until: validInput.value,
    cottage: cottageInput.value
  };

  try {
    const res = await fetch("/api/register_card", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      logMsg("❌ " + (data.error || "Save failed"), "#b91c1c");
      return;
    }

    logMsg("✅ Card registered", "#15803d");
    clearForm();

    if (activeCottage)
      loadCottage(activeCottage);

  } catch(err) {
    logMsg("❌ Server offline", "#b91c1c");
  }
}

/* -------------------------
   LOAD USERS (FIXED ROUTE)
--------------------------*/
async function loadCottage(cottage) {

  activeCottage = cottage;

  const res = await fetch(`/api/users?cottage=${cottage}`);
  const users = await res.json();

  const tbody = document.getElementById("userRows");
  tbody.innerHTML = "";

  users.forEach(u => {
    tbody.innerHTML += `
      <tr>
        <td>${u.name}</td>
        <td>${u.employee_id || "-"}</td>
        <td>${u.valid_until || "-"}</td>
        <td>${u.created_at || "-"}</td>
        <td>
          <button onclick="deleteUser('${u.uid}')">🗑</button>
        </td>
      </tr>
    `;
  });
}

/* -------------------------
   DELETE
--------------------------*/
async function deleteUser(uid) {
  await fetch(`/api/users/${uid}`, { method:"DELETE" });
  if (activeCottage) loadCottage(activeCottage);
}
</script>

</body>
</html>
