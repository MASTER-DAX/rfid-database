<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Cottage System – RFID Management</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
<link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css"/>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<style>

:root{
  --bg:#3a3f50;
  --card:#2f3345;
  --primary:#f8f1f1;
  --text:#f5e9e9;
  --muted:#aaaaaa;
  --border:#555555;
}

body{
  margin:0;
  font-family:Nunito,system-ui;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */

#sidebar{
  width:64px;
  transition:.3s;
}

#sidebar span{
  opacity:0;
  transition:.2s;
  white-space:nowrap;
}

#sidebar:hover{
  width:170px;
}

#sidebar:hover span{
  opacity:1;
}

.main{
  margin-left:64px;
  padding:24px;
  width:100%;
}

#sidebar:hover ~ .main{
  margin-left:170px;
}

/* DASHBOARD GRID WIDTH FIX */

.dashboard{
  display:grid;
  grid-template-columns: 2fr 1fr; /* logs wider */
  gap:20px;
  width:100%;
}

/* CARD */

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  width:100%;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

th{
  background:#3d4256;
  text-align:left;
}

/* FORM */

label{
  display:block;
  margin-top:10px;
  font-size:13px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  font-weight:bold;
  color:#333;
}

input[readonly]{
  background:#ddd;
}

/* BUTTONS */

.actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}

button.primary{
  flex:1;
  background:var(--primary);
  color:var(--bg);
  border:0;
  padding:12px;
  border-radius:10px;
  font-weight:600;
}

button.secondary{
  flex:1;
  background:transparent;
  border:1px solid var(--primary);
  color:var(--primary);
  padding:12px;
  border-radius:10px;
}

#log{
  margin-top:12px;
  font-size:13px;
  font-weight:600;
}

</style>
</head>

<body class="flex">

<!-- SIDEBAR -->

<div id="sidebar" class="fixed h-screen bg-card shadow px-4">

<ul class="mt-10 space-y-6 text-gray-400">

   <li>
      <a href="index.html" class="flex items-center text-blue-400 font-semibold">
        <i class="fas fa-home w-6 text-center"></i>
        <span class="ml-3">Dashboard</span>
      </a>
    </li>

    <li>
      <a href="accounts.html" class="flex items-center hover:text-blue-300">
        <i class="fas fa-users w-6 text-center"></i>
        <span class="ml-3">Accounts</span>
      </a>
    </li>

      <li>
      <a href="logs.html" class="flex items-center hover:text-blue-300">
        <i class="fas fa-users w-6 text-center"></i>
        <span class="ml-3">Logs</span>
      </a>
    </li>
    
    <li class="pt-6 border-t border-gray-700">
      <a class="flex items-center hover:text-red-400">
        <i class="fas fa-sign-out-alt w-6 text-center"></i>
        <span class="ml-3">Logout</span>
      </a>
    </li>

</ul>

</div>


<!-- MAIN -->

<div class="main">

<h1 class="text-xl font-extrabold mb-5">RFID Management</h1>

<div class="dashboard">

<!-- LEFT : RFID LOGS -->

<div class="card">

<h3 class="text-lg font-bold mb-3">Latest RFID Taps</h3>

<table>
<thead>
<tr>
<th>UID</th>
<th>Timestamp</th>
</tr>
</thead>
<tbody id="logsTable"></tbody>
</table>

<button id="seeMoreBtn" class="mt-3 px-3 py-1 bg-gray-500 text-white rounded text-sm">See more</button>

</div>


<!-- RIGHT : REGISTER -->

<div class="card">

<h3 class="text-lg font-bold mb-3">Register Card</h3>

<label>Card UID
<input id="uid" readonly placeholder="Tap card">
</label>

<label>Name
<input id="name">
</label>

<label>Employee ID
<input id="employee_id">
</label>

<label>Access Level
<select id="access_level">
<option value="guest">Guest</option>
<option value="basic">Basic</option>
<option value="premium">Premium</option>
<option value="admin">Admin</option>
</select>
</label>

<label>Valid Until
<input type="date" id="valid_until">
</label>

<label>Cottage
<select id="cottage">
<option>COTTAGE-1</option>
<option>COTTAGE-2</option>
<option>COTTAGE-3</option>
<option>COTTAGE-4</option>
</select>
</label>

<div class="actions">
<button class="primary" onclick="save()">Save</button>
<button class="secondary" onclick="clearForm()">Clear</button>
</div>

<div id="log">Waiting for card…</div>

</div>

</div>

</div>


<script>

const API_BASE = "";
const socket = io();

let cardStillValid=false;

const uid=document.getElementById("uid");
const nameInput=document.getElementById("name");
const employeeInput=document.getElementById("employee_id");
const accessInput=document.getElementById("access_level");
const validInput=document.getElementById("valid_until");
const cottageInput=document.getElementById("cottage");


socket.on("card_tapped",data=>{

uid.value=data.uid;

if(data.access==="granted"){
cardStillValid=true;
logMsg("Card already registered — ACCESS GRANTED","#f59e0b");
}else{
cardStillValid=false;
logMsg("New/expired card — ready to register","#22c55e");
}

});


function logMsg(msg,color="#fff"){
const log=document.getElementById("log");
log.textContent=msg;
log.style.color=color;
}


function clearForm(){
nameInput.value="";
employeeInput.value="";
validInput.value="";
cardStillValid=false;
}


async function save(){

if(!uid.value || !nameInput.value){
logMsg("Tap card + enter name first","#ef4444");
return;
}

if(cardStillValid){
logMsg("Card still valid. Cannot re-register.","#ef4444");
return;
}

const payload={
uid:uid.value,
name:nameInput.value,
employee_id:employeeInput.value,
access_level:accessInput.value,
valid_until:validInput.value,
cottage:cottageInput.value
};

try{

const res=await fetch("/api/register_card",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const data=await res.json();

if(!res.ok){
logMsg(data.error || "Save failed","#ef4444");
return;
}

logMsg("Card registered","#22c55e");
clearForm();

}catch(err){
logMsg("Server offline","#ef4444");
}

}


/* LOAD LOGS */

let allLogs = [];
let logsShown = 5; // initial na ipapakita

async function loadLogs() {
  try {
    const res = await fetch(`${API_BASE}/api/taps`);
    const logs = await res.json();
    allLogs = logs; // save lahat

    renderLogs();
  } catch (e) {
    console.error(e);
  }
}

function renderLogs() {
  const tbody = document.getElementById("logsTable");
  tbody.innerHTML = "";

  // ipakita lang yung top n logs
  allLogs.slice(0, logsShown).forEach(log => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${log.uid}</td><td>${log.ts}</td>`;
    tbody.appendChild(tr);
  });

  // hide button kung lahat na ang nakikita
  document.getElementById("seeMoreBtn").style.display = (logsShown >= allLogs.length) ? "none" : "block";
}

// button para magpakita ng mas marami
document.getElementById("seeMoreBtn").addEventListener("click", () => {
  logsShown += 5; // dagdag 5 bawat click
  renderLogs();
});

// initial load
loadLogs();
setInterval(loadLogs, 5000);

</script>

</body>
</html>
