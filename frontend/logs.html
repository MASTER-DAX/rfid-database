<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Cottage System – RFID Logs</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<!-- Tailwind -->
<link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css"/>

<style>
:root{
  --bg:#3a3f50;
  --card:#2f3345;
  --primary:#f8f1f1;
  --text:#f5e9e9;
  --muted:#aaaaaa;
  --border:#555555;
}

body{
  margin:0;
  font-family:Nunito,system-ui;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
#sidebar{width:64px;transition:all .3s ease;z-index:50;}
#sidebar span{opacity:0;white-space:nowrap;transition:opacity .2s ease;}
#sidebar:hover{width:170px;}
#sidebar:hover span{opacity:1;}
.main{margin-left:64px;transition:margin-left .3s ease;padding:24px;height:100vh;overflow:auto;}
#sidebar:hover ~ .main{margin-left:170px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.header h1{font-size:22px;font-weight:800;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat{background:var(--card);padding:16px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;}
.stat h3{font-size:13px;color:var(--muted);}
.stat p{font-size:22px;font-weight:800;}
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.06);}
.card h3{font-size:16px;font-weight:800;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;}
th{background:#3d4256;text-align:left;}
.btn{background:var(--primary);color:var(--bg);border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="fixed h-screen bg-card shadow px-4">
  <ul class="mt-10 space-y-6 text-gray-400">
    <li>
      <a href="index.html" class="flex items-center text-blue-400 font-semibold">
        <i class="fas fa-home w-6 text-center"></i>
        <span class="ml-3">Dashboard</span>
      </a>
    </li>

    <li>
      <a href="accounts.html" class="flex items-center hover:text-blue-300">
        <i class="fas fa-users w-6 text-center"></i>
        <span class="ml-3">Accounts</span>
      </a>
    </li>

      <li>
      <a href="logs.html" class="flex items-center hover:text-blue-300">
        <i class="fas fa-users w-6 text-center"></i>
        <span class="ml-3">Logs</span>
      </a>
    </li>
  </ul>
</div>

  
<!-- MAIN -->
<div class="main">
  <div class="header">
    <h1>RFID Tap Logs</h1>
  </div>

  <div class="card">
    <h3>Latest RFID Taps</h3>
    <table>
      <thead>
        <tr>
          <th>UID</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>
  </div>
</div>

<script>
const API_BASE = "";

// ---------------- LOAD LOGS ----------------
async function loadLogs(){
  try{
    const res = await fetch(`${API_BASE}/api/taps`);
    const logs = await res.json();

    const tbody = document.getElementById("logsTable");
    tbody.innerHTML = "";

    logs.forEach(log=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${log.uid}</td><td>${log.ts}</td>`;
      tbody.appendChild(tr);
    });

  }catch(e){
    console.error("Failed to load logs:", e);
  }
}

// initial load
loadLogs();

// auto-refresh every 5s
setInterval(loadLogs, 5000);
</script>

</body>
</html>
