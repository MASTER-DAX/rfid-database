<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Cottage System – Dashboard + Servo</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<!-- Tailwind -->
<link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css"/>

<style>
:root{
  --bg:#3a3f50;
  --card:#2f3345;
  --primary:#f8f1f1;
  --text:#f5e9e9;
  --muted:#aaaaaa;
  --border:#555555;
}

body{
  margin:0;
  font-family:Nunito,system-ui;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
#sidebar{width:64px;transition:all .3s ease;z-index:50;}
#sidebar span{opacity:0;white-space:nowrap;transition:opacity .2s ease;}
#sidebar:hover{width:170px;}
#sidebar:hover span{opacity:1;}

/* MAIN SHIFT */
.main{margin-left:64px;transition:margin-left .3s ease;padding:24px;height:100vh;overflow:auto;}
#sidebar:hover ~ .main{margin-left:170px;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.header h1{font-size:22px;font-weight:800;}
.profile{display:flex;align-items:center;gap:10px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat{background:var(--card);padding:16px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;}
.stat h3{font-size:13px;color:var(--muted);}
.stat p{font-size:22px;font-weight:800;}

/* GRID */
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}

/* CARD */
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.06);}
.card h3{font-size:16px;font-weight:800;margin-bottom:12px;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;}
th{background:#3d4256;text-align:left;}

/* BUTTON */
.btn{background:var(--primary);color:var(--bg);border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;}

/* LIST */
.list{font-size:13px;}
.list div{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}

/* CLOCK */
.clock-container{display:flex;flex-direction:column;align-items:center;margin-top:20px;}
#clockCanvas{background:var(--card);border-radius:50%;}

/* INPUTS */
.servo-container input, .servo-container select{padding:6px 8px;border-radius:8px;border:none;font-weight:bold;text-align:center;  color:rgb(58, 56, 56);}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="fixed h-screen bg-card shadow px-4">
  <ul class="mt-10 space-y-6 text-gray-400">

    <li>
      <a href="index.html" class="flex items-center text-blue-400 font-semibold">
        <i class="fas fa-home w-6 text-center"></i>
        <span class="ml-3">Dashboard</span>
      </a>
    </li>

    <li>
      <a href="accounts.html" class="flex items-center hover:text-blue-300">
        <i class="fas fa-users w-6 text-center"></i>
        <span class="ml-3">Accounts</span>
      </a>
    </li>

    <li class="pt-6 border-t border-gray-700">
      <a class="flex items-center hover:text-red-400">
        <i class="fas fa-sign-out-alt w-6 text-center"></i>
        <span class="ml-3">Logout</span>
      </a>
    </li>

  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h1>Dashboard</h1>
    <div class="profile">
      <i class="far fa-bell"></i>
      <strong>Admin</strong>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div>
        <h3>Total Cottages</h3>
        <p>—</p>
      </div>
      <i class="fas fa-home"></i>
    </div>

    <div class="stat">
      <div>
        <h3>Active Guests</h3>
        <p id="activeGuests">0</p>
      </div>
      <i class="fas fa-user-friends"></i>
    </div>

    <div class="stat">
      <div>
        <h3>Revenue</h3>
        <p>—</p>
      </div>
      <i class="fas fa-wallet"></i>
    </div>

    <div class="stat">
      <div>
        <h3>Occupancy</h3>
        <p>—</p>
      </div>
      <i class="fas fa-chart-pie"></i>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- USERS TABLE -->
    <div class="card">
      <div class="flex justify-between items-center mb-3">
        <h3>Registered Cards Database</h3>
        <button class="btn" id="refreshBtn">Update Database</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Employee ID</th>
            <th>Access Level</th>
            <th>Valid Until</th>
            <th>Cottage</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <!-- CLOCK + SERVO CONTROL -->
    <div class="grid gap-5">

      <div class="card">
        <h3>Privacy Simulation</h3>
        <canvas id="clockCanvas" width="250" height="250"></canvas>
        <div class="servo-container" style="margin-top:10px; display:flex; justify-content:center; gap:10px;">
          <input type="number" id="hourInput" min="0" max="23" value="6"/>
          <select id="ampmInput">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
          <button class="btn" id="setTimeBtn">Set</button>
        </div>
        <p style="text-align:center; margin-top:5px;" id="servoStatus">Servo Status: Idle</p>
      </div>

     <!-- Cottage Status Control -->
<div class="card">
  <h3>Cottages Status</h3>

  <div style="margin-top:10px;">
    <label>Select Cottage</label>
    <select id="cottageSelect">
      <option value="1">Cottage 1</option>
      <option value="2">Cottage 2</option>
      <option value="3">Cottage 3</option>
      <option value="4">Cottage 4</option>
      <option value="5">Cottage 5</option>
      <option value="6">Cottage 6</option>
      <option value="7">Cottage 7</option>
      <option value="8">Cottage 8</option>
      <option value="9">Cottage 9</option>
      <option value="10">Cottage 10</option>
    </select>
  </div>

  <div style="margin-top:10px;">
    <label>Status</label>
    <select id="statusSelect">
      <option value="active">ACTIVE</option>
      <option value="inactive">INACTIVE</option>
    </select>
  </div>

  <button onclick="setCottageStatus()" style="margin-top:10px;">
    Update Status
  </button>

  <p id="statusResult"></p>
</div>

    </div>

  </div>
</div>

<script>
async function setCottageStatus(){
  let cottage = document.getElementById("cottageSelect").value;
  let status = document.getElementById("statusSelect").value;

  try{
    let res = await fetch("/api/set_cottage_status",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        cottage:cottage,
        status:status
      })
    });

    let data = await res.json();
    console.log("Server Response:", data);

    document.getElementById("statusResult").innerText =
      "Cottage " + cottage + " is now " + status.toUpperCase();

  }catch(err){
    document.getElementById("statusResult").innerText =
      "Server error updating cottage status";
    console.error(err);
  }
}

const API_BASE = "";
async function loadUsers(){
  try{
    const res = await fetch(`${API_BASE}/api/users`);
    const users = await res.json();
    document.getElementById("activeGuests").textContent = users.length;

    const tbody = document.getElementById("usersTable");
    tbody.innerHTML = "";
    users.forEach(u=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${u.name||"-"}</td>
        <td>${u.employee_id||"-"}</td>
        <td>${u.access_level||"-"}</td>
        <td>${u.valid_until||"-"}</td>
        <td>${u.cottage||"-"}</td>
      `;
      tbody.appendChild(tr);
    });
  }catch(e){console.error(e);}
}
document.getElementById("refreshBtn").onclick = loadUsers;
loadUsers();
</script>

<script>
/*********** SERVO CLOCK LOGIC ***********/
const ESP_IP = "192.168.100.235";
const canvas = document.getElementById("clockCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;
ctx.translate(radius,radius);

let currentHour = 6;
let currentMinute = 0;
let currentSecond = 0;
let dragging = false;
let servoRunning = false;

function drawClock(){
  ctx.clearRect(-radius,-radius,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.arc(0,0,radius-5,0,2*Math.PI);
  ctx.fillStyle = "#3a3f50";
  ctx.fill();
  ctx.strokeStyle = "#aaaaaa";
  ctx.lineWidth = 4;
  ctx.stroke();

  for(let i=0;i<12;i++){
    let angle=i*Math.PI/6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle)*(radius-15),Math.sin(angle)*(radius-15));
    ctx.lineTo(Math.cos(angle)*(radius-25),Math.sin(angle)*(radius-25));
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth=3;
    ctx.stroke();
  }

  let hourAngle = ((currentHour%12)+currentMinute/60)*Math.PI/6;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(Math.cos(hourAngle- Math.PI/2)*(radius-60), Math.sin(hourAngle- Math.PI/2)*(radius-60));
  ctx.strokeStyle="#ffffff";
  ctx.lineWidth=6;
  ctx.stroke();

  let minAngle = (currentMinute/60)*2*Math.PI;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(Math.cos(minAngle- Math.PI/2)*(radius-40),Math.sin(minAngle- Math.PI/2)*(radius-40));
  ctx.strokeStyle="#aaaaaa";
  ctx.lineWidth=4;
  ctx.stroke();

  let secAngle = (currentSecond/60)*2*Math.PI;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(Math.cos(secAngle- Math.PI/2)*(radius-30), Math.sin(secAngle- Math.PI/2)*(radius-30));
  ctx.strokeStyle="#ffffff";
  ctx.lineWidth=2;
  ctx.stroke();
}

function updateTime(){
  currentSecond++;
  if(currentSecond>=60){currentSecond=0;currentMinute++;}
  if(currentMinute>=60){currentMinute=0;currentHour++;}
  if(currentHour>=24) currentHour=0;
  drawClock();
}
setInterval(updateTime,1000);

canvas.addEventListener("mousedown", e=>{dragging=true; updateClockFromMouse(e);});
canvas.addEventListener("mousemove", e=>{if(dragging) updateClockFromMouse(e);});
canvas.addEventListener("mouseup", e=>{dragging=false;});
canvas.addEventListener("mouseleave", e=>{dragging=false;});

function updateClockFromMouse(e){
  const rect = canvas.getBoundingClientRect();
  const x=e.clientX-rect.left-radius;
  const y=e.clientY-rect.top-radius;
  let angle=Math.atan2(y,x)+Math.PI/2;
  if(angle<0) angle+=2*Math.PI;
  let h=Math.floor(angle/(Math.PI/6));
  currentHour=h;
  drawClock();
  if(currentHour===6) triggerServoFromClock(6);
  if(currentHour===18) triggerServoFromClock(18);
}

const hourInput = document.getElementById("hourInput");
const ampmInput = document.getElementById("ampmInput");
const setTimeBtn = document.getElementById("setTimeBtn");
setTimeBtn.addEventListener("click",()=>{
  let hour = parseInt(hourInput.value);
  const ampm = ampmInput.value;
  if(ampm==="PM" && hour<12) hour+=12;
  if(ampm==="AM" && hour===12) hour=0;
  currentHour=hour%12;
  drawClock();
  if(hour===6) triggerServoFromClock(6);
  if(hour===18) triggerServoFromClock(18);
});

function triggerServoFromClock(hour){
  servoRunning=true;
  document.getElementById("servoStatus").textContent="Servo Status: Rotating";
  let cmd=hour===6?"6AM":"6PM";
  fetch(`http://${ESP_IP}/${cmd.toLowerCase()}`)
    .then(res=>res.text())
    .then(data=>{
      console.log("Servo Triggered:",data);
      setTimeout(()=>{
        servoRunning=false;
        document.getElementById("servoStatus").textContent="Servo Status: Idle";
      },15000);
    }).catch(err=>console.error(err));
}
</script>

</body>
</html>
